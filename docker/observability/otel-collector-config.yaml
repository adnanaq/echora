receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 2s
    send_batch_size: 2048
    send_batch_max_size: 4096
  # Enrich all telemetry with host-level resource attributes (host.name,
  # os.type).  The "docker" detector is omitted because it requires the Docker
  # socket to be bind-mounted into the container.  "env" + "system" cover all
  # needed attributes without that dependency.
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  prometheus:
    endpoint: 0.0.0.0:8889
  # debug exporter is intentionally NOT wired into any pipeline.
  # To enable verbose span/metric/log logging for local troubleshooting,
  # add "debug" to the desired pipeline's exporters list and restart.
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp/loki]
