name: echora

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: echora-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - echora-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    ulimits:
      # Increase file descriptor limit for high-concurrency database operations
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7
    container_name: echora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - echora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: echora-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - echora-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  vector-service:
    build:
      context: ..
      dockerfile: apps/vector_service/Dockerfile.dev
    container_name: echora-vector-service
    ports:
      - "8001:8001"
    environment:
      # Environment (enables development mode: debug=True, log_level=DEBUG)
      - ENVIRONMENT=development

      # Vector Service Configuration
      - VECTOR_SERVICE_HOST=0.0.0.0
      - VECTOR_SERVICE_PORT=8001

      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=anime_database
      - QDRANT_DISTANCE_METRIC=cosine

      # Embedding Configuration
      - TEXT_EMBEDDING_PROVIDER=huggingface
      - TEXT_EMBEDDING_MODEL=BAAI/bge-m3
      - IMAGE_EMBEDDING_PROVIDER=openclip
      - IMAGE_EMBEDDING_MODEL=ViT-L-14/laion2b_s32b_b82k

      # Model cache — all three vars must agree; they match the Dockerfile defaults.
      # Override here only if you need a non-standard cache location.
      - HF_HOME=/app/model_cache
      - TORCH_HOME=/app/model_cache/torch
      - MODEL_CACHE_DIR=/app/model_cache

      # Performance Configuration
      - QDRANT_ENABLE_QUANTIZATION=false
      - QDRANT_QUANTIZATION_TYPE=scalar
      - QDRANT_ENABLE_PAYLOAD_INDEXING=true
      - QDRANT_PREFETCH_LIMIT_MULTIPLIER=10
      - QDRANT_RRF_K=2

      # API Configuration
      - API_TITLE=Anime Vector Service
      - API_VERSION=1.0.0
      - MAX_SEARCH_LIMIT=100
      - MAX_BATCH_SIZE=500

      # Observability
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_ENABLE_TRACING=true
      - OTEL_ENABLE_METRICS=true
      - OTEL_ENABLE_LOGGING=true

      # HTTP Cache Configuration
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - FORCE_CACHE=true
    volumes:
      - model-cache:/app/model_cache
    networks:
      - echora-network
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8001"]
      interval: 30s
      timeout: 15s
      retries: 5
      # start_period covers first-run model download (BGE-M3 + ViT-L-14 ≈ 2.2 GB).
      # On subsequent starts with a warm cache this grace period is unused.
      start_period: 15m
    restart: unless-stopped

  enrichment-service:
    build:
      context: ..
      dockerfile: apps/enrichment_service/Dockerfile.dev
    container_name: echora-enrichment-service
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - ENRICHMENT_SERVICE_HOST=0.0.0.0
      - ENRICHMENT_SERVICE_PORT=8002
      - ENRICHMENT_DEFAULT_FILE_PATH=/app/data/qdrant_storage/anime-offline-database.json
      - ENRICHMENT_OUTPUT_DIR=/app/assets/seed_data
      # Observability
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_ENABLE_TRACING=true
      - OTEL_ENABLE_METRICS=true
      - OTEL_ENABLE_LOGGING=true
      - OTEL_ENABLE_AIOHTTP_CLIENT_INSTRUMENTATION=true
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../data:/app/data:ro
      - ../assets/seed_data:/app/assets/seed_data
    networks:
      - echora-network
    depends_on:
      redis:
        condition: service_healthy
      crawl4ai:
        condition: service_started
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: echora-crawl4ai
    shm_size: "2gb" # Chromium needs large /dev/shm; default 64MB causes "browser has been closed" crashes
    # Skip supervisord (and its bundled Redis) — use our echora-redis instead.
    # The server reads redis.uri from config.yml mounted below.
    command:
      [
        "uvicorn",
        "server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "11235",
        "--log-level",
        "info",
        "--timeout-keep-alive",
        "300",
      ]
    ports:
      - "11235:11235"
    environment:
      MAX_CONCURRENT_TASKS: "3" # 3 concurrent MAL tabs
    volumes:
      - ./crawl4ai-config.yml:/app/config.yml:ro
    networks:
      - echora-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  echora-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  redisinsight-data:
    driver: local
  # Model cache for embedding models (BGE-M3 + ViT-L-14, ~4 GB total).
  # Stored under $HOME to avoid filling the root partition.
  # Docker manages this as a named volume so lifecycle matches other volumes
  # (inspect/rm via `docker volume`). In production replace driver_opts with
  # a real volume on persistent storage.
  model-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.local/share/echora/model-cache
