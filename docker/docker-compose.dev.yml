# -----------------------------------------------------------------------------
# Development Application Stack
#
# Purpose:
# - Run Echora app services and local data dependencies for development
# - Supports vector/enrichment services with hot iteration workflow
#
# Run:
#   docker compose -f docker/docker-compose.dev.yml up -d
#
# Docs:
# - README.md
# - docs/technical.md
# -----------------------------------------------------------------------------
services:
  # Qdrant Vector Database
  # - Primary vector storage backend
  # - Exposes API/UI on :6333 and gRPC on :6334
  qdrant:
    image: qdrant/qdrant:latest
    container_name: echora-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - vector-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    ulimits:
      # Increase file descriptor limit for high-concurrency database operations
      nofile:
        soft: 65536
        hard: 65536

  # Redis Cache
  # - Shared cache backend (HTTP cache + enrichment pipeline caching)
  # - Exposes Redis on :6379
  redis:
    image: redis:7
    container_name: echora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - vector-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # RedisInsight UI
  # - Optional Redis debugging/inspection UI
  # - Exposes UI on :5540
  redisinsight:
    image: redis/redisinsight:latest
    container_name: echora-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - vector-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Vector Service (gRPC)
  # - Semantic/vector search and vector admin operations
  # - Exposes gRPC on :8001
  # Build with Pants: pants package apps/vector_service:vector-service-dev
  vector-service:
    build:
      context: ..
      dockerfile: apps/vector_service/Dockerfile.dev
    container_name: echora-vector-service
    ports:
      - "8001:8001"
    environment:
      # Environment (enables development mode: debug=True, log_level=DEBUG)
      - ENVIRONMENT=development

      # Vector Service Configuration
      - VECTOR_SERVICE_HOST=0.0.0.0
      - VECTOR_SERVICE_PORT=8001

      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=anime_database
      - QDRANT_DISTANCE_METRIC=cosine

      # Modern Embedding Configuration
      - TEXT_EMBEDDING_PROVIDER=huggingface
      - TEXT_EMBEDDING_MODEL=BAAI/bge-m3
      - IMAGE_EMBEDDING_PROVIDER=openclip
      - IMAGE_EMBEDDING_MODEL=ViT-L-14/laion2b_s32b_b82k
      # Performance Configuration
      - QDRANT_ENABLE_QUANTIZATION=false
      - QDRANT_QUANTIZATION_TYPE=scalar
      - QDRANT_ENABLE_PAYLOAD_INDEXING=true

      # API Configuration
      - API_TITLE=Anime Vector Service
      - API_VERSION=1.0.0
      - MAX_SEARCH_LIMIT=100
      - MAX_BATCH_SIZE=500
      # Observability
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_ENABLE_TRACING=true
      - OTEL_ENABLE_METRICS=true
      - OTEL_ENABLE_LOGGING=true

      # HTTP Cache Configuration (for Enrichment Pipeline)
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - FORCE_CACHE=true
    volumes:
      - model-cache:/app/cache
    networks:
      - vector-network
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Enrichment Service (gRPC)
  # - Metadata enrichment and pipeline orchestration
  # - Exposes gRPC on :8002
  enrichment-service:
    build:
      context: ..
      dockerfile: apps/enrichment_service/Dockerfile.dev
    container_name: echora-enrichment-service
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - ENRICHMENT_SERVICE_HOST=0.0.0.0
      - ENRICHMENT_SERVICE_PORT=8002
      - ENRICHMENT_DEFAULT_FILE_PATH=/app/data/qdrant_storage/anime-offline-database.json
      - ENRICHMENT_OUTPUT_DIR=/app/assets/seed_data
      # Observability
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_ENABLE_TRACING=true
      - OTEL_ENABLE_METRICS=true
      - OTEL_ENABLE_LOGGING=true
      - OTEL_ENABLE_AIOHTTP_CLIENT_INSTRUMENTATION=true
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../data:/app/data:ro
      - ../assets/seed_data:/app/assets/seed_data
    networks:
      - vector-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  vector-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  redisinsight-data:
    driver: local
  model-cache:
    driver: local
