# -----------------------------------------------------------------------------
# Local Observability Stack (single collector topology)
#
# Purpose:
# - Fast local debugging with one OpenTelemetry Collector
# - Exposes Grafana/Prometheus/Loki/Tempo/Alertmanager on localhost
#
# Run:
#   docker compose -f docker/docker-compose.obs.yml up -d
#

services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: echora-prometheus
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alert-rules.yaml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
    networks:
      - observability-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: echora-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Internal Metrics
      - "8889:8889" # App Metrics
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability-network

  loki:
    image: grafana/loki:3.6.7
    container_name: echora-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-network

  tempo:
    image: grafana/tempo:2.10.1
    container_name: echora-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo
      - "4317" # OTLP gRPC
    networks:
      - observability-network

  grafana:
    image: grafana/grafana:12.4.0
    container_name: echora-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability-network

  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: echora-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - observability-network

networks:
  observability-network:
    name: echora_observability-network
    external: true

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  alertmanager-data:
