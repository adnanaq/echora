syntax = "proto3";

package shared_proto.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// =============================================================================
// ENUMS
// =============================================================================

enum AnimeStatus {
  ANIME_STATUS_UNSPECIFIED = 0;
  ANIME_STATUS_FINISHED = 1;
  ANIME_STATUS_UPCOMING = 2;
  ANIME_STATUS_ONGOING = 3;
  ANIME_STATUS_UNKNOWN = 4;
}

// Primary entity type for vector indexing/filtering.
enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0;
  ENTITY_TYPE_ANIME = 1;
  ENTITY_TYPE_CHARACTER = 2;
  ENTITY_TYPE_EPISODE = 3;
}

enum AnimeType {
  ANIME_TYPE_UNSPECIFIED = 0;
  ANIME_TYPE_MOVIE = 1;
  ANIME_TYPE_ONA = 2;
  ANIME_TYPE_OVA = 3;
  ANIME_TYPE_SPECIAL = 4;
  ANIME_TYPE_TV = 5;
  ANIME_TYPE_UNKNOWN = 6;
  ANIME_TYPE_MUSIC = 7;
  ANIME_TYPE_PV = 8;
  ANIME_TYPE_TV_SPECIAL = 9;
  ANIME_TYPE_TV_SHORT = 10;
  ANIME_TYPE_CM = 11;
}

// Renamed from AnimeSourceMaterial — extended with new source types.
enum SourceMaterialType {
  SOURCE_MATERIAL_TYPE_UNSPECIFIED = 0;
  SOURCE_MATERIAL_TYPE_ORIGINAL = 1;
  SOURCE_MATERIAL_TYPE_MANGA = 2;
  SOURCE_MATERIAL_TYPE_LIGHT_NOVEL = 3;
  SOURCE_MATERIAL_TYPE_VISUAL_NOVEL = 4;
  SOURCE_MATERIAL_TYPE_GAME = 5;
  SOURCE_MATERIAL_TYPE_WEB_MANGA = 6;
  SOURCE_MATERIAL_TYPE_WEB_NOVEL = 7;
  SOURCE_MATERIAL_TYPE_NOVEL = 8;
  SOURCE_MATERIAL_TYPE_ONE_SHOT = 9;
  SOURCE_MATERIAL_TYPE_DOUJINSHI = 10;
  SOURCE_MATERIAL_TYPE_FOUR_KOMA = 11;
  SOURCE_MATERIAL_TYPE_MIXED_MEDIA = 12;
  SOURCE_MATERIAL_TYPE_MUSIC = 13;
  SOURCE_MATERIAL_TYPE_RADIO = 14;
  SOURCE_MATERIAL_TYPE_BOOK = 15;
  SOURCE_MATERIAL_TYPE_PICTURE_BOOK = 16;
  SOURCE_MATERIAL_TYPE_CARD_GAME = 17;
  SOURCE_MATERIAL_TYPE_OTHER = 18;
  SOURCE_MATERIAL_TYPE_UNKNOWN = 19;
}

enum AnimeRating {
  ANIME_RATING_UNSPECIFIED = 0;
  ANIME_RATING_G = 1;
  ANIME_RATING_PG = 2;
  ANIME_RATING_PG13 = 3;
  ANIME_RATING_R = 4;
  ANIME_RATING_RPLUS = 5;
  ANIME_RATING_RX = 6;
}

enum AnimeSeason {
  ANIME_SEASON_UNSPECIFIED = 0;
  ANIME_SEASON_SPRING = 1;
  ANIME_SEASON_SUMMER = 2;
  ANIME_SEASON_FALL = 3;
  ANIME_SEASON_WINTER = 4;
}

// Normalized character role across all sources.
enum CharacterRole {
  CHARACTER_ROLE_UNSPECIFIED = 0;
  CHARACTER_ROLE_MAIN = 1;
  CHARACTER_ROLE_SUPPORTING = 2;
  CHARACTER_ROLE_BACKGROUND = 3;
  CHARACTER_ROLE_CAMEO = 4;
}

// Relation type between two anime entries (13 types).
// ALTERNATIVE_VERSION = same story retold (e.g. TV vs. movie cut).
// ALTERNATIVE_SETTING = same characters, different universe / AU.
enum AnimeRelationType {
  ANIME_RELATION_TYPE_UNSPECIFIED = 0;
  ANIME_RELATION_TYPE_ADAPTATION = 1;
  ANIME_RELATION_TYPE_ALTERNATIVE_VERSION = 2;
  ANIME_RELATION_TYPE_ALTERNATIVE_SETTING = 3;
  ANIME_RELATION_TYPE_CHARACTER = 4;
  ANIME_RELATION_TYPE_CROSSOVER = 5;
  ANIME_RELATION_TYPE_FULL_STORY = 6;
  ANIME_RELATION_TYPE_OTHER = 7;
  ANIME_RELATION_TYPE_PARENT_STORY = 8;
  ANIME_RELATION_TYPE_PREQUEL = 9;
  ANIME_RELATION_TYPE_SEQUEL = 10;
  ANIME_RELATION_TYPE_SIDE_STORY = 11;
  ANIME_RELATION_TYPE_SPIN_OFF = 12;
  ANIME_RELATION_TYPE_SUMMARY = 13;
}

// Relation type between an anime and its source material.
enum SourceMaterialRelationType {
  SOURCE_MATERIAL_RELATION_TYPE_UNSPECIFIED = 0;
  SOURCE_MATERIAL_RELATION_TYPE_ADAPTATION = 1;
  SOURCE_MATERIAL_RELATION_TYPE_ORIGINAL_STORY = 2;
  SOURCE_MATERIAL_RELATION_TYPE_SPIN_OFF = 3;
  SOURCE_MATERIAL_RELATION_TYPE_ALTERNATIVE = 4;
  SOURCE_MATERIAL_RELATION_TYPE_OTHER = 5;
}

// =============================================================================
// SIMPLE / SHARED MESSAGES
// =============================================================================

// Helper for map<string, repeated string>.
message StringList {
  repeated string values = 1;
}

message TrailerEntry {
  optional string url = 1;
  optional string title = 2;
  optional string thumbnail_url = 3;
}

// Aired date range. Fields renamed from from_date/to for clarity.
message AiredDates {
  optional google.protobuf.Timestamp aired_from = 1;
  optional google.protobuf.Timestamp aired_to = 2;
}

// Weekly broadcast slot (from MAL/Jikan) plus per-version streaming times
// and premiere dates (from AnimSchedule). Merged from the old separate
// Broadcast + BroadcastSchedule + PremiereDates messages.
message Broadcast {
  // Weekly slot (MAL)
  optional string day = 1;
  optional string time = 2;
  optional string timezone = 3;
  // Per-version streaming times (AnimSchedule)
  optional string jp_time = 4;
  optional string sub_time = 5;
  optional string dub_time = 6;
  optional int32 sub_delay_days = 7;
  optional int32 dub_delay_days = 8;
  // Premiere dates
  optional google.protobuf.Timestamp premiere_jp = 9;
  optional google.protobuf.Timestamp premiere_sub = 10;
  optional google.protobuf.Timestamp premiere_dub = 11;
}

// Hiatus information — replaces the old DelayInformation message.
message AnimeHiatus {
  bool on_hiatus = 1;
  optional string hiatus_from = 2;
  optional string hiatus_until = 3;
  optional string hiatus_reason = 4;
}

message EnrichmentMetadata {
  string source = 1;
  google.protobuf.Timestamp enriched_at = 2;
  bool success = 3;
  optional string error_message = 4;
}

// Anime-to-source-material relation (replaces the old RelationEntry).
message SourceMaterial {
  string title = 1;
  SourceMaterialRelationType relation_type = 2;
  string url = 3;
}

// Anime-to-anime relation entry.
message RelatedAnimeEntry {
  string title = 1;
  AnimeRelationType relation_type = 2;
  string url = 3;
  optional AnimeType type = 4;
}

message StreamingEntry {
  string platform = 1;
  string url = 2;
  optional string region = 3;
  optional bool free = 4;
  optional bool premium_required = 5;
  optional bool dub_available = 6;
  repeated string subtitle_languages = 7;
}

message ThemeEntry {
  string name = 1;
  optional string description = 2;
}

message ThemeSong {
  string title = 1;
  optional string artist = 2;
  optional string episodes = 3;
}

message SimpleVoiceActor {
  string name = 1;
  string language = 2;
}

message VoiceActorEntry {
  string name = 1;
  optional string native_name = 2;
  string language = 3;
  optional string image = 4;
}

message StaffMember {
  map<string, int64> staff_ids = 1;
  string name = 2;
  optional string native_name = 3;
  string role = 4;
  optional string image = 5;
  optional string biography = 6;
  optional string birth_date = 7;
  optional string hometown = 8;
  repeated string primary_occupations = 9;
  repeated int32 years_active = 10;
  optional string gender = 11;
  optional string blood_type = 12;
  optional int64 community_favorites = 13;
  optional string enhancement_status = 14;
}

message VoiceActor {
  map<string, int64> staff_ids = 1;
  string name = 2;
  optional string native_name = 3;
  repeated string character_assignments = 4;
  optional string image = 5;
  optional string biography = 6;
  optional string birth_date = 7;
  optional string blood_type = 8;
}

// Production company (studio, producer, licensor).
// type and url removed — sources: repeated string replaces url,
// description added for optional freeform info.
message CompanyEntry {
  string name = 1;
  optional string description = 2;
  repeated string sources = 3;
}

message StaffMemberList {
  repeated StaffMember items = 1;
}

// Dynamic role -> list[StaffMember].
message ProductionStaff {
  map<string, StaffMemberList> roles = 1;
}

message VoiceActors {
  repeated VoiceActor japanese = 1;
}

// Studios and producers are now directly on Anime, not in StaffData.
message StaffData {
  ProductionStaff production_staff = 1;
  repeated CompanyEntry licensors = 2;
  VoiceActors voice_actors = 3;
}

message ContextualRank {
  int32 rank = 1;
  string type = 2;
  optional string format = 3;
  optional int32 year = 4;
  optional string season = 5;
  optional bool all_time = 6;
}

message Statistics {
  optional float score = 1;
  optional int64 scored_by = 2;
  optional int64 rank = 3;
  optional int64 popularity_rank = 4;
  optional int64 members = 5;
  optional int64 favorites = 6;
  repeated ContextualRank contextual_ranks = 7;
}

message ScoreCalculations {
  optional float arithmetic_geometric_mean = 1;
  optional float arithmetic_mean = 2;
  optional float median = 3;
}

// Community-contributed character appearance in a specific episode.
message EpisodeCharacterAppearance {
  map<string, int64> character_ids = 1;
  string name = 2;
  string role = 3;
  repeated SimpleVoiceActor voice_actors = 4;
}

// Community-contributed staff credit for a specific episode.
message EpisodeStaffCredit {
  map<string, int64> staff_ids = 1;
  string name = 2;
  string role = 3;
}

// =============================================================================
// PRIMARY ENTITY MESSAGES
// =============================================================================

message Character {
  optional string age = 1;
  optional string description = 2;
  optional string eye_color = 3;
  optional int64 favorites = 4;
  optional string gender = 5;
  optional string hair_color = 6;
  optional string id = 7;
  EntityType entity_type = 8;
  string name = 9;
  optional string name_native = 10;
  CharacterRole role = 11;
  repeated string anime_ids = 12;
  repeated string character_traits = 13;
  repeated string images = 14;
  repeated string name_variations = 15;
  repeated string nicknames = 16;
  repeated SimpleVoiceActor voice_actors = 17;
  // sources replaces character_pages (list instead of map)
  repeated string sources = 18;
  // Free-form biographical key-value pairs (Age, Height, Blood type, etc.)
  google.protobuf.Struct character_info = 19;
  repeated google.protobuf.Struct animeography = 20;
  repeated google.protobuf.Struct mangaography = 21;
}

message Episode {
  optional google.protobuf.Timestamp aired = 1;
  optional string anime_id = 2;
  optional string description = 3;
  optional int32 duration = 4;
  int32 episode_number = 5;
  bool filler = 6;
  optional string id = 7;
  EntityType entity_type = 8;
  bool recap = 9;
  optional float score = 10;
  optional int32 season_number = 11;
  optional string synopsis = 12;
  string title = 13;
  optional string title_japanese = 14;
  optional string title_romaji = 15;
  // images replaces thumbnails
  repeated string images = 16;
  map<string, string> streaming = 17;
  // sources replaces episode_pages (list instead of map)
  repeated string sources = 18;
  repeated EpisodeCharacterAppearance characters = 19;
  repeated EpisodeStaffCredit staff = 20;
}

message Anime {
  optional string background = 1;
  optional int32 duration = 2;
  int32 episode_count = 3;
  string id = 4;
  EntityType entity_type = 5;
  optional string month = 6;
  optional bool nsfw = 7;
  optional AnimeRating rating = 8;
  optional AnimeSeason season = 9;
  optional float similarity_score = 10;
  optional SourceMaterialType source_material = 11;
  AnimeStatus status = 12;
  optional string synopsis = 13;
  string title = 14;
  optional string title_english = 15;
  optional string title_japanese = 16;
  AnimeType type = 17;
  optional int32 year = 18;
  repeated string content_warnings = 19;
  repeated string demographics = 20;
  repeated ThemeSong ending_themes = 21;
  repeated string genres = 22;
  repeated ThemeSong opening_themes = 23;
  repeated RelatedAnimeEntry related_anime = 24;
  // related_source_material replaces relations (RelationEntry → SourceMaterial)
  repeated SourceMaterial related_source_material = 25;
  repeated string sources = 26;
  repeated StreamingEntry streaming_info = 27;
  repeated string streaming_licenses = 28;
  repeated string synonyms = 29;
  repeated string tags = 30;
  repeated ThemeEntry themes = 31;
  repeated TrailerEntry trailers = 32;
  AiredDates aired_dates = 33;
  // Unified broadcast message (weekly slot + streaming times + premiere dates)
  Broadcast broadcast = 34;
  EnrichmentMetadata enrichment_metadata = 35;
  map<string, string> external_links = 36;
  map<string, StringList> images = 37;
  google.protobuf.Struct popularity_trends = 38;
  ScoreCalculations score = 39;
  StaffData staff_data = 40;
  map<string, Statistics> statistics = 41;
  // Studios and producers moved out of StaffData onto Anime directly
  repeated CompanyEntry studios = 42;
  repeated CompanyEntry producers = 43;
  // Hiatus info (replaces delay_information)
  optional AnimeHiatus hiatus = 44;
}

message AnimeRecord {
  Anime anime = 1;
  repeated Character characters = 2;
  repeated Episode episodes = 3;
}
